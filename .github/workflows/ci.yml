name: CI - Linting & Typechecks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Type Check
        run: npm run type-check

  build-and-push:
    name: Build, Test & Push Docker
    runs-on: ubuntu-latest
    needs: quality
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v6

      - name: Lowercase image name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Load (Local Test)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke Test (Docker Compose)
        env:
          DOCKER_IMAGE: ${{ env.IMAGE_NAME }}:test
        run: |
          docker compose -f docker-compose.prod.yml config
          docker compose -f docker-compose.prod.yml up -d
          
          # Wait for container to be healthy (simple curl test)
          # Note: Adjust port if 9001:3000 mapping in compose is correct for test env
          MAX_RETRIES=5
          COUNT=0
          until $(curl --output /dev/null --silent --head --fail http://localhost:9001); do
            if [ $COUNT -eq $MAX_RETRIES ]; then
              echo "Smoke test failed: Service did not respond."
              docker compose -f docker-compose.prod.yml logs
              exit 1
            fi
            echo "Waiting for service... ($((++COUNT))/$MAX_RETRIES)"
            sleep 5
          done
          
          docker compose -f docker-compose.prod.yml ps
          docker compose -f docker-compose.prod.yml down

      - name: Build and Push (Final)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
