name: CI - Quality & Build

on:
  pull-request:
    branches: [ main ]

env:
  # Opt into Node.js 24 for all actions now to avoid deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Type Check
        run: npm run type-check

  build:
    name: Build Test
    runs-on: ubuntu-latest
    needs: quality # Wait for quality checks to pass
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Application (Client & Server)
        run: npm run build

      - name: Docker Build Test
        run: docker build . -t smashorpass:test
